<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>כניסה — מערכת הנגשת מסמכים</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Segoe UI', 'Arial', sans-serif;
      background: linear-gradient(135deg, #1A4E8A 0%, #0d2f56 100%);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .card {
      background: #fff;
      border-radius: 16px;
      padding: 48px 40px 40px;
      width: 100%;
      max-width: 400px;
      box-shadow: 0 20px 60px rgba(0,0,0,0.3);
      text-align: center;
    }

    .logo {
      width: 72px;
      height: 72px;
      background: #1A4E8A;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 0 auto 20px;
      font-size: 32px;
    }

    h1 {
      color: #1A4E8A;
      font-size: 1.4rem;
      margin-bottom: 6px;
    }

    .subtitle {
      color: #666;
      font-size: 0.9rem;
      margin-bottom: 32px;
    }

    .form-group {
      margin-bottom: 20px;
      text-align: right;
    }

    label {
      display: block;
      font-size: 0.85rem;
      font-weight: 600;
      color: #333;
      margin-bottom: 6px;
    }

    input[type="password"] {
      width: 100%;
      padding: 12px 16px;
      border: 2px solid #e0e0e0;
      border-radius: 8px;
      font-size: 1rem;
      transition: border-color 0.2s;
      direction: ltr;
      text-align: center;
      letter-spacing: 3px;
    }

    input[type="password"]:focus {
      outline: none;
      border-color: #1A4E8A;
    }

    input[type="password"].error-input {
      border-color: #e53e3e;
    }

    .error-msg {
      background: #fff5f5;
      border: 1px solid #feb2b2;
      color: #c53030;
      padding: 10px 14px;
      border-radius: 8px;
      font-size: 0.9rem;
      margin-bottom: 16px;
    }

    button[type="submit"] {
      width: 100%;
      padding: 14px;
      background: #1A4E8A;
      color: #fff;
      border: none;
      border-radius: 8px;
      font-size: 1rem;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.2s;
    }

    button[type="submit"]:hover {
      background: #163f70;
    }

    .footer {
      margin-top: 28px;
      font-size: 0.8rem;
      color: #aaa;
    }
  </style>
</head>
<body>
  <div class="card">
    <div class="logo">🔒</div>
    <h1>מערכת הנגשת מסמכים</h1>
    <p class="subtitle">עיריית אילת — שימוש פנימי בלבד</p>

    {% if error %}
    <div class="error-msg">{{ error }}</div>
    {% endif %}

    <form method="POST" action="/login">
      <input type="hidden" name="next" value="{{ next }}">
      <div class="form-group">
        <label for="password">סיסמה</label>
        <input
          type="password"
          id="password"
          name="password"
          placeholder="••••••••"
          autofocus
          autocomplete="current-password"
          {% if error %}class="error-input"{% endif %}
        >
      </div>
      <button type="submit">כניסה</button>
    </form>

    <p class="footer">עיריית אילת &copy; {{ 2026 }}</p>
  </div>
</body>
</html>
